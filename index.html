<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pedra,papel ou tesoura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Griffy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>Pedra, Papel ou tesoura</h1>
    </header>
    <main>
        <section class="jogador">
            <h3>Jogador: <span>escolha sua jogada</span></h3>
            <div class="opção opção-jogador">
                <div>
                    <img opt="pedra" src="IMG/pedra.jpg" alt="">
                </div>
                <div>
                    <img opt="papel" src="IMG/papel.jpg" alt="">
                </div>
                <div>
                    <img opt="tesoura" src="IMG/tesoura.jpg" alt="">
                </div>
            </div>
        </section>

        <section class="resultado">
            <h3>vencedor:</h3>
            <p id="resultado"></p>
        </section>

        <section class="computador">
            <h3>computador</h3>
            <div class="opção opção-computador">
                <div>
                    <img opt="pedra" src="IMG/pedra.jpg" alt="">
                </div>
                <div>
                    <img opt="papel" src="IMG/papel.jpg" alt="">
                </div>
                <div>
                    <img opt="tesoura" src="IMG/tesoura.jpg" alt="">
                </div>
            </div>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
